{% extends 'base.html' %}
{% load static i18n %}

{% block title %}{% trans "Тест" %}: {{ lesson.title }}{% endblock %}

{% block extra_head %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #eef2fb; }
  #modern-test {
    --primary: #10b981;
    --primary-dark: #059669;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text: #0f172a;
    --text-muted: #64748b;
    --bg-gradient: linear-gradient(145deg, #eef2fb 0%, #f9f7fd 100%);
    --card-bg: rgba(255, 255, 255, 0.94);
    --card-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
    --border-radius: 32px;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-gradient);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: 130px;
  }
  .top-bar {
    position: sticky;
    top: 110px;
    z-index: 99;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    padding: 16px 32px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    margin-bottom: 20px;
  }
  .top-left { display: flex; align-items: center; gap: 30px; flex-wrap: wrap; }
  .question-counter { font-weight: 700; background: #f1f5f9; padding: 8px 20px; border-radius: 40px; font-size: 1.1rem; }
  .dragon-lives { display: flex; gap: 15px; align-items: center; background: white; padding: 8px 20px; border-radius: 60px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .life-dragon { width: 55px; height: 55px; transition: all 0.2s ease; cursor: default; }
  .life-dragon.active { filter: drop-shadow(0 0 8px #ffb300) brightness(1.1); opacity: 1; }
  .life-dragon.lost { filter: grayscale(1) brightness(0.5); opacity: 0.4; }
  .life-dragon.fire { animation: fireBreath 0.8s ease-out; }
  @keyframes fireBreath {
    0% { filter: brightness(1); transform: scale(1); }
    25% { filter: brightness(1.8) drop-shadow(0 0 15px #ff6600); transform: scale(1.3); }
    50% { filter: brightness(1.2) drop-shadow(0 0 8px #ffaa00); transform: scale(1.15); }
    100% { filter: brightness(0.4) grayscale(1); transform: scale(0.9); opacity: 0.5; }
  }
  .top-right { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .timer-block { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 8px 20px; border-radius: 60px; }
  .timer-text { font-weight: 800; font-size: 1.6rem; min-width: 50px; text-align: center; }
  .timer-bar { width: 100px; height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
  .timer-progress { height: 100%; width: 100%; background: var(--primary); transition: width 0.2s linear; }
  .timer-progress.warning { background: var(--warning); }
  .timer-progress.danger { background: var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 24px 56px; }
  .quiz-card { width: 100%; max-width: 1100px; background: var(--card-bg); backdrop-filter: blur(14px); border-radius: var(--border-radius); box-shadow: var(--card-shadow); padding: 32px 36px 44px; }
  .character-area { display: flex; align-items: flex-start; gap: 0; margin-bottom: 10px; position: relative; padding-left: 200px; min-height: 260px; }
  .dino-avatar { position: absolute; left: -80px; top: -100px; width: 360px !important; height: 360px !important; background: transparent; border: none; object-fit: contain; z-index: 2; }
  .speech-bubble { background: white; border-radius: 28px; padding: 20px 32px; flex: 1; border: 1px solid #e2e8f0; box-shadow: 0 8px 24px rgba(0,0,0,0.06); z-index: 1; }
  #question-text { font-size: 2rem; font-weight: 800; line-height: 1.35; margin: 0; }
  .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
  .option-btn { display: flex; align-items: center; gap: 16px; background: white; border: 2px solid #e9eef2; border-radius: 24px; padding: 16px 20px; cursor: pointer; transition: 0.2s; font-weight: 600; }
  .option-btn:hover { background: #fafcff; border-color: #b0c4d9; transform: translateY(-2px); }
  .option-letter { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; border-radius: 20px; font-size: 1.4rem; color: var(--primary); border: 2px solid #e2e8f0; }
  .option-btn:hover .option-letter { background: var(--primary); color: white; }
  .option-text { flex: 1; line-height: 1.3; }
  .correct-glow { background: #ecfdf5 !important; border-color: var(--primary) !important; animation: correctPulse 0.45s ease; }
  .correct-glow .option-letter { background: var(--primary) !important; color: white; }
  @keyframes correctPulse { 0% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 100% { box-shadow: 0 0 0 14px rgba(16,185,129,0); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }
  .wrong-shake { animation: shake 0.3s ease; background: #fef2f2 !important; border-color: var(--danger) !important; }
  .wrong-shake .option-letter { background: var(--danger) !important; color: white; }
  .option-btn.disabled { opacity: 0.7; pointer-events: none; }
  .feedback { margin-top: 20px; padding: 12px 20px; border-radius: 20px; font-size: 0.95rem; text-align: center; }
  .feedback.correct { background: #d1fae5; color: #065f46; }
  .feedback.wrong { background: #fee2e2; color: #991b1b; }
  @media (max-width: 800px) { .options-grid { grid-template-columns: 1fr; } .character-area { padding-left: 140px; min-height: 200px; } .dino-avatar { width: 200px !important; height: 200px !important; top: -60px; left: -40px; } #question-text { font-size: 1.6rem; } .life-dragon { width: 40px; height: 40px; } }
  @media (max-width: 550px) { .quiz-card { padding: 24px 20px 32px; } .character-area { padding-left: 100px; min-height: 150px; } .dino-avatar { width: 130px !important; height: 130px !important; top: -40px; left: -25px; } .top-bar { flex-direction: column; align-items: stretch; } .top-left, .top-right { justify-content: space-between; } .life-dragon { width: 35px; height: 35px; } .option-btn { padding: 12px 16px; gap: 12px; } .option-letter { width: 38px; height: 38px; font-size: 1.2rem; } }
</style>
{% endblock %}

{% block content %}
<div id="modern-test">
  <div class="top-bar">
    <div class="top-left">
      <span class="question-counter" id="question-counter">1 / {{ questions.count }}</span>
      <div class="dragon-lives" id="dragon-lives"></div>
    </div>
    <div class="top-right">
      <div class="timer-block">
        <span class="timer-text" id="timer-text">30</span>
        <div class="timer-bar">
          <div class="timer-progress" id="timer-progress"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="quiz-card">
      <div class="character-area">
        <img src="https://i.imgur.com/mrrNTcQ.png" class="dino-avatar" alt="🦖"
             onerror="this.onerror=null; this.src='https://via.placeholder.com/360/fbbf24/000?text=🦖'">
        <div class="speech-bubble">
          <p id="question-text">{% trans "Загрузка вопроса..." %}</p>
        </div>
      </div>
      <div class="options-grid" id="options-container"></div>
      <div id="feedback" class="feedback" style="display: none;"></div>
    </div>
  </div>
</div>

<script>
  window.lessonId = {{ lesson.id }};
  window.csrfToken = '{{ csrf_token }}';

  const questionsJson = [
    {% for question in questions %}
    {
      id: {{ question.id }},
      text: "{{ question.text|escapejs }}",
      question_type: "{{ question.question_type }}",
      correct_option: {{ question.correct_option }},
      explanation: "{{ question.explanation|escapejs }}",
      audio_url: "{{ question.audio_url|default:'' }}",
      options_raw: [{% for num, opt in question.get_options %}"{{ opt|escapejs }}"{% if not forloop.last %},{% endif %}{% endfor %}],
      correct_answer_text: "{{ question.option1|escapejs }}"
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ];

  for (let q of questionsJson) {
    let options = q.options_raw.slice();
    let correctValue = options[q.correct_option - 1];
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    q.options = options;
    q.correct_option = options.indexOf(correctValue) + 1;
  }

  let currentQuestionIndex = 0;
  let timerInterval = null;
  let canAnswer = true;
  let totalQuestions = questionsJson.length;
  let lives = 5;
  const TOTAL_LIVES = 5;

  const questionTextEl = document.getElementById('question-text');
  const questionCounterEl = document.getElementById('question-counter');
  const timerTextEl = document.getElementById('timer-text');
  const timerProgressEl = document.getElementById('timer-progress');
  const optionsContainer = document.getElementById('options-container');
  const feedbackDiv = document.getElementById('feedback');

  function playSound(type) {
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      if (type === 'correct') {
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
        osc.stop(ctx.currentTime + 0.5);
      } else {
        osc.frequency.value = 440;
        gain.gain.value = 0.3;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
        osc.stop(ctx.currentTime + 0.3);
      }
      setTimeout(() => ctx.close(), 600);
    } catch(e) { console.warn(e); }
  }

  function showFeedback(isCorrect, explanation) {
    feedbackDiv.style.display = 'block';
    feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
    if (isCorrect) {
      feedbackDiv.innerHTML = `<i class="fas fa-check-circle"></i> {% trans "Правильно!" %} ${explanation ? ' ' + explanation : ''}`;
    } else {
      feedbackDiv.innerHTML = `<i class="fas fa-times-circle"></i> {% trans "Неправильно." %} ${explanation ? ' ' + explanation : '{% trans "Попробуйте ещё раз." %}'}`;
    }
    setTimeout(() => {
      if (feedbackDiv.style.display !== 'none') feedbackDiv.style.display = 'none';
    }, 2000);
  }

  function updateDragonLives() {
    const container = document.getElementById('dragon-lives');
    if (!container) return;
    container.innerHTML = '';
    for (let i = 0; i < TOTAL_LIVES; i++) {
      const dragon = document.createElement('img');
      dragon.src = 'https://i.imgur.com/swvWgEt.png';
      dragon.classList.add('life-dragon');
      if (i >= lives) {
        dragon.classList.add('lost');
      } else {
        dragon.classList.add('active');
      }
      container.appendChild(dragon);
    }
  }

  function loseLife() {
    if (lives <= 0) return;
    const activeDragons = document.querySelectorAll('.life-dragon.active');
    const dragonToAnimate = activeDragons[activeDragons.length - 1];
    lives--;
    updateDragonLives();
    const quizCard = document.querySelector('.quiz-card');
    if (quizCard) {
      quizCard.classList.add('wrong-shake');
      setTimeout(() => quizCard.classList.remove('wrong-shake'), 400);
    }
    if (dragonToAnimate) {
      dragonToAnimate.classList.add('fire');
      setTimeout(() => dragonToAnimate.classList.remove('fire'), 800);
    }
    if (lives === 0) {
      setTimeout(() => {
        alert('{% trans "💔 Вы проиграли! Начните тест заново." %}');
        window.location.reload();
      }, 1000);
    }
  }

  function loadQuestion(index) {
    if (!canAnswer) return;
    if (index >= totalQuestions) {
      finishTestSuccess();
      return;
    }
    const q = questionsJson[index];
    questionTextEl.textContent = q.text;
    questionCounterEl.textContent = `${index + 1} / ${totalQuestions}`;
    optionsContainer.innerHTML = '';
    feedbackDiv.style.display = 'none';

    let audioBtn = document.getElementById('audio-play-btn');
    if (audioBtn) audioBtn.remove();
    if (q.audio_url) {
      const btn = document.createElement('button');
      btn.id = 'audio-play-btn';
      btn.style.cssText = 'margin-top: 10px; background: #f1f5f9; border: none; border-radius: 40px; padding: 8px 16px; cursor: pointer; font-size: 0.9rem;';
      btn.innerHTML = '<i class="fas fa-volume-up"></i> {% trans "Прослушать" %}';
      btn.onclick = () => { new Audio(q.audio_url).play(); };
      document.querySelector('.speech-bubble').appendChild(btn);
    }

    if (q.question_type === 'choice' || q.question_type === 'audio_choice') {
      q.options.forEach((optText, idx) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option-btn';
        btn.innerHTML = `
          <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
          <span class="option-text">${optText}</span>
        `;
        btn.onclick = () => handleOptionClick(btn, idx + 1, q.correct_option, index, q.explanation);
        optionsContainer.appendChild(btn);
      });
    } else if (q.question_type === 'translate') {
      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = '{% trans "Введите перевод..." %}';
      input.style.cssText = 'width: 100%; padding: 16px; border-radius: 24px; border: 2px solid #e2e8f0; margin-bottom: 16px; font-size: 1rem;';
      const submitBtn = document.createElement('button');
      submitBtn.textContent = '{% trans "Проверить" %}';
      submitBtn.className = 'option-btn';
      submitBtn.style.justifyContent = 'center';
      submitBtn.onclick = () => {
        const userAnswer = input.value.trim().toLowerCase();
        const isCorrect = (userAnswer === q.correct_answer_text.toLowerCase());
        if (isCorrect) {
          playSound('correct');
          showFeedback(true, q.explanation);
          setTimeout(() => {
            currentQuestionIndex++;
            loadQuestion(currentQuestionIndex);
          }, 800);
        } else {
          playSound('wrong');
          showFeedback(false, q.explanation);
          loseLife();
          if (lives === 0) return;
          setTimeout(() => {
            loadQuestion(index);
          }, 1500);
        }
      };
      optionsContainer.appendChild(input);
      optionsContainer.appendChild(submitBtn);
    }
    startTimer(q.time_limit || 30);
  }

  function handleOptionClick(btnElement, selectedIdx, correctIdx, questionIndex, explanation) {
    if (!canAnswer) return;
    canAnswer = false;
    clearInterval(timerInterval);
    const isCorrect = (selectedIdx === correctIdx);

    if (isCorrect) {
      playSound('correct');
      btnElement.classList.add('correct-glow');
      showFeedback(true, explanation);
      setTimeout(() => {
        canAnswer = true;
        currentQuestionIndex++;
        loadQuestion(currentQuestionIndex);
      }, 600);
    } else {
      playSound('wrong');
      btnElement.classList.add('wrong-shake');
      showFeedback(false, explanation);
      loseLife();
      if (lives === 0) return;
      setTimeout(() => {
        btnElement.classList.remove('wrong-shake');
        canAnswer = true;
        loadQuestion(questionIndex);
      }, 1200);
    }
  }

  function startTimer(seconds) {
    if (timerInterval) clearInterval(timerInterval);
    let timeLeft = seconds;
    const updateTimerUI = () => {
      timerTextEl.textContent = timeLeft;
      const percent = (timeLeft / seconds) * 100;
      timerProgressEl.style.width = percent + '%';
      timerProgressEl.classList.remove('warning', 'danger');
      if (percent <= 30) timerProgressEl.classList.add('danger');
      else if (percent <= 60) timerProgressEl.classList.add('warning');
    };
    updateTimerUI();
    timerInterval = setInterval(() => {
      if (!canAnswer) return;
      timeLeft--;
      if (timeLeft < 0) timeLeft = 0;
      updateTimerUI();
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (canAnswer) {
          canAnswer = false;
          loseLife();
          showFeedback(false, '{% trans "Время вышло!" %}');
          if (lives === 0) return;
          setTimeout(() => {
            canAnswer = true;
            loadQuestion(currentQuestionIndex);
          }, 1200);
        }
      }
    }, 1000);
  }

  function finishTestSuccess() {
    if (typeof confetti === 'function') {
      confetti({ particleCount: 300, spread: 90, origin: { y: 0.6 }, colors: ['#10b981', '#fbbf24', '#3b82f6'] });
    }
    fetch(`/lesson/${window.lessonId}/test/submit/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': window.csrfToken, 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ 'final_score': '1' })
    }).then(() => {
      showResultModal(true);
    });
  }

  function showResultModal(success) {
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(8px);
    `;
    overlay.innerHTML = `
      <div style="background: white; border-radius: 28px; padding: 32px 40px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.25); border: 3px solid ${success ? '#10b981' : '#ef4444'};">
        <div style="font-size: 4rem; margin-bottom: 16px;">${success ? '🎉' : '💔'}</div>
        <h3 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 12px;">${success ? '{% trans "Урок пройден!" %}' : '{% trans "Попробуйте ещё раз" %}'}</h3>
        <p style="color: #64748b; margin-bottom: 24px;">${success ? '{% trans "Отличная работа!" %}' : '{% trans "Не переживайте, практика делает совершенным!" %}'}</p>
        <button onclick="window.location.href='/course/{{ lesson.course.slug }}/'" style="background: ${success ? '#10b981' : '#ef4444'}; color: white; border: none; padding: 14px 32px; border-radius: 50px; font-weight: 700; cursor: pointer;">${success ? '{% trans "Продолжить курс" %}' : '{% trans "Вернуться к уроку" %}'}</button>
      </div>
    `;
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
  }

  updateDragonLives();
  loadQuestion(0);
</script>
{% endblock %}
