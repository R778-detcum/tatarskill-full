{% extends 'base.html' %}
{% load i18n %}

{% block title %}{{ community.name }} — {% trans "закрытое сообщество" %}{% endblock %}

{% block content %}
<div class="container-custom py-5" style="margin-top: 100px;">
    <div class="card-glass p-5 text-center">
        <i class="fas fa-lock fa-4x text-warning mb-3"></i>
        <h1 class="section-title">{{ community.name }}</h1>
        <p>{% trans "Это закрытое сообщество. Для вступления введите пароль." %}</p>
        <form method="post" class="mt-3">
            {% csrf_token %}
            <input type="password" name="password" class="form-control w-50 mx-auto mb-3" placeholder="{% trans 'Пароль' %}" required>
            <button type="submit" class="btn-primary-custom">{% trans "Вступить" %}</button>
        </form>
    </div>
</div>
{% endblock %}
