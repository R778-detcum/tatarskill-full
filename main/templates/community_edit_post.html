{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Редактировать пост" %}{% endblock %}

{% block content %}
<div class="container-custom py-5" style="margin-top: 100px;">
    <div class="card-glass p-5">
        <h1 class="section-title">{% trans "Редактировать пост" %}</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary-custom">{% trans "Сохранить" %}</button>
            <a href="{% url 'community_detail' post.community.slug %}" class="btn-outline-custom">{% trans "Отмена" %}</a>
        </form>
    </div>
</div>
{% endblock %}
